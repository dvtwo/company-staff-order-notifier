services:
  - type: web
    name: company-staff-order-notifier
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:render
    preDeployCommand: npm run prisma:migrate:deploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_customers
      - key: SHOPIFY_API_VERSION
        value: 2025-04
      - key: DATABASE_URL
        fromDatabase:
          name: company-staff-order-notifier-db
          property: connectionString
databases:
  - name: company-staff-order-notifier-db
    plan: basic-256mb
    diskSizeGB: 1
