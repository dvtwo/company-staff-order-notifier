# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4ff0bde3507b274dd4d379f3e80b84d3"
name = "company-staff-order-notifier"
application_url = "https://company-staff-order-notifier.onrender.com"
embedded = true
handle = "company-staff-order-notifier"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app_uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders_create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_companies"

[auth]
redirect_urls = [
  "https://company-staff-order-notifier.onrender.com/auth/callback",
  "https://company-staff-order-notifier.onrender.com/auth/shopify/callback",
  "https://company-staff-order-notifier.onrender.com/api/auth/callback"
]
